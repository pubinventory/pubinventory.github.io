   <h2>Ad Slot 2 (Second - With Privacy Settings)</h2>
  <ins id="slot-2-container"></ins>
  
  <script>
    // We use a timeout to guarantee the first slot fully initializes GPT

    setTimeout(() => {

      const container = document.getElementById('slot-2-container');
      container.innerHTML = `
        <ins class="adsbygoogle"

    }, 2000);
